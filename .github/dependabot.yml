version: 2
updates:
  # ── npm workspace (one root lockfile covers packages/* + website) ────────
  # Dependabot reads the root package.json "workspaces" field, updates every
  # workspace manifest AND the single shared package-lock.json in one PR.
  # Per-subdir entries cannot touch the root lock, so `npm ci` failed.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      patch-and-minor:
        update-types: ['patch', 'minor']
    ignore:
      - dependency-name: zod                     # pinned for MCP SDK compat
      - dependency-name: typescript
        update-types: ['version-update:semver-major']
      - dependency-name: '@types/node'
        update-types: ['version-update:semver-major']
      - dependency-name: vite                    # extension
        update-types: ['version-update:semver-major']
      - dependency-name: redis                   # mcp-cloud
        update-types: ['version-update:semver-major']
      - dependency-name: vercel                  # mcp-cloud
        update-types: ['version-update:semver-major']
      - dependency-name: react                   # website — coordinated upgrade
        update-types: ['version-update:semver-major']
      - dependency-name: react-dom
        update-types: ['version-update:semver-major']
      - dependency-name: '@types/react'
        update-types: ['version-update:semver-major']
      - dependency-name: '@types/react-dom'
        update-types: ['version-update:semver-major']
      - dependency-name: next
        update-types: ['version-update:semver-major']
      - dependency-name: eslint
        update-types: ['version-update:semver-major']

  # ── GitHub Actions ──────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
