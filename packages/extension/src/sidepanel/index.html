<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design Mode</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── CSS Custom Properties (shadcn preset b1D0dv86 + dm-* mappings) ── */
    :root[data-theme="dark"] {
      /* shadcn tokens — dark */
      --background: oklch(0.145 0 0);
      --foreground: oklch(0.985 0 0);
      --primary: oklch(0.922 0 0);
      --primary-foreground: oklch(0.205 0 0);
      --secondary: oklch(0.269 0 0);
      --secondary-foreground: oklch(0.985 0 0);
      --muted: oklch(0.269 0 0);
      --muted-foreground: oklch(0.708 0 0);
      --accent: oklch(0.269 0 0);
      --accent-foreground: oklch(0.985 0 0);
      --destructive: oklch(0.704 0.191 22.216);
      --border: oklch(1 0 0 / 10%);
      --input: oklch(1 0 0 / 15%);
      --ring: oklch(0.556 0 0);
      --radius: 0rem;

      /* dm-* mapped to shadcn tokens */
      --dm-bg: oklch(0.145 0 0);
      --dm-bg-secondary: oklch(1 0 0 / 4%);
      --dm-bg-tertiary: oklch(1 0 0 / 6%);
      --dm-bg-active: oklch(1 0 0 / 8%);
      --dm-text: oklch(0.985 0 0);
      --dm-text-secondary: oklch(0.82 0 0);
      --dm-text-muted: oklch(0.708 0 0);
      --dm-text-dim: oklch(0.6 0 0);
      --dm-text-dimmer: oklch(0.45 0 0);
      --dm-input-bg: oklch(1 0 0 / 4%);
      --dm-input-border: oklch(1 0 0 / 10%);
      --dm-input-border-hover: oklch(1 0 0 / 18%);
      --dm-separator: oklch(1 0 0 / 6%);
      --dm-separator-strong: oklch(1 0 0 / 10%);
      --dm-accent: #4F9EFF;
      --dm-accent-bg: rgba(79,158,255,0.12);
      --dm-accent-border: rgba(79,158,255,0.25);
      --dm-danger: oklch(0.704 0.191 22.216);
      --dm-danger-bg: oklch(0.704 0.191 22.216 / 10%);
      --dm-danger-border: oklch(0.704 0.191 22.216 / 22%);
      --dm-success: #22c55e;
      --dm-success-bg: rgba(34,197,94,0.2);
      --dm-purple: #8b5cf6;
      --dm-purple-bg: rgba(139,92,246,0.06);
      --dm-purple-border: rgba(139,92,246,0.25);
      --dm-yellow: #FBBF24;
      --dm-btn-bg: oklch(1 0 0 / 6%);
      --dm-btn-border: oklch(1 0 0 / 10%);
      --dm-btn-bg-disabled: oklch(1 0 0 / 3%);
      --dm-btn-border-disabled: oklch(1 0 0 / 5%);
      --dm-scrollbar-thumb: oklch(1 0 0 / 10%);
      --dm-scrollbar-thumb-hover: oklch(1 0 0 / 20%);
    }
    :root[data-theme="light"] {
      /* shadcn tokens — light */
      --background: oklch(1 0 0);
      --foreground: oklch(0.145 0 0);
      --primary: oklch(0.205 0 0);
      --primary-foreground: oklch(0.985 0 0);
      --secondary: oklch(0.97 0 0);
      --secondary-foreground: oklch(0.205 0 0);
      --muted: oklch(0.97 0 0);
      --muted-foreground: oklch(0.556 0 0);
      --accent: oklch(0.97 0 0);
      --accent-foreground: oklch(0.205 0 0);
      --destructive: oklch(0.577 0.245 27.325);
      --border: oklch(0.922 0 0);
      --input: oklch(0.922 0 0);
      --ring: oklch(0.708 0 0);
      --radius: 0rem;

      /* dm-* mapped to shadcn tokens */
      --dm-bg: oklch(0.99 0 0);
      --dm-bg-secondary: oklch(0 0 0 / 4%);
      --dm-bg-tertiary: oklch(0 0 0 / 5%);
      --dm-bg-active: oklch(0 0 0 / 8%);
      --dm-text: oklch(0.145 0 0);
      --dm-text-secondary: oklch(0.35 0 0);
      --dm-text-muted: oklch(0.556 0 0);
      --dm-text-dim: oklch(0.556 0 0);
      --dm-text-dimmer: oklch(0.72 0 0);
      --dm-input-bg: oklch(0 0 0 / 4%);
      --dm-input-border: oklch(0.922 0 0);
      --dm-input-border-hover: oklch(0 0 0 / 18%);
      --dm-separator: oklch(0 0 0 / 8%);
      --dm-separator-strong: oklch(0 0 0 / 10%);
      --dm-accent: #4F9EFF;
      --dm-accent-bg: rgba(79,158,255,0.12);
      --dm-accent-border: rgba(79,158,255,0.25);
      --dm-danger: oklch(0.577 0.245 27.325);
      --dm-danger-bg: oklch(0.577 0.245 27.325 / 8%);
      --dm-danger-border: oklch(0.577 0.245 27.325 / 18%);
      --dm-success: #22c55e;
      --dm-success-bg: rgba(34,197,94,0.15);
      --dm-purple: #8b5cf6;
      --dm-purple-bg: rgba(139,92,246,0.04);
      --dm-purple-border: rgba(139,92,246,0.2);
      --dm-yellow: #FBBF24;
      --dm-btn-bg: oklch(0 0 0 / 5%);
      --dm-btn-border: oklch(0.922 0 0);
      --dm-btn-bg-disabled: oklch(0 0 0 / 2%);
      --dm-btn-border-disabled: oklch(0 0 0 / 5%);
      --dm-scrollbar-thumb: oklch(0 0 0 / 12%);
      --dm-scrollbar-thumb-hover: oklch(0 0 0 / 20%);
    }

    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: var(--dm-bg);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      color: var(--dm-text);
    }
    body { display: flex; flex-direction: column; }
    #dm-root { flex: 1; overflow-y: auto; overflow-x: hidden; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--dm-scrollbar-thumb); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--dm-scrollbar-thumb-hover); }
    input, select, button { font-family: inherit; }
    input[type="color"] { -webkit-appearance: none; border: none; }
    input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
    input[type="color"]::-webkit-color-swatch { border: none; border-radius: 3px; }

    /* ── Utility classes ── */
    .dm-input {
      background: var(--dm-input-bg);
      border: 1px solid var(--dm-input-border);
      border-radius: 5px;
      color: var(--dm-text);
      font-size: 11px;
      padding: 6px;
      outline: none;
      font-family: 'SF Mono', Monaco, monospace;
      transition: border-color 0.12s ease;
    }
    .dm-input:hover { border-color: var(--dm-input-border-hover); }
    .dm-input:focus { border-color: var(--dm-accent); }

    /* Lists inside the rich-text editor — show markers and don't push the
       text away from the editor edge. Inside-positioned markers keep the
       bullet/number visible on the dark sidepanel background. */
    [data-dm-richtext] ul, [data-dm-richtext] ol {
      margin: 4px 0;
      padding-left: 22px;
      list-style-position: outside;
    }
    [data-dm-richtext] ul { list-style-type: disc; }
    [data-dm-richtext] ol { list-style-type: decimal; }
    [data-dm-richtext] li { line-height: 1.5; padding-left: 2px; }
    [data-dm-richtext] a { color: var(--dm-accent); text-decoration: underline; }

    /* Filter sliders — uniform gray track from end to end with just the
       accent-colored round thumb (no progressive blue fill, since these
       sliders are bipolar / neutral-centered, not 0→x meters). */
    .dm-fslider {
      -webkit-appearance: none;
      appearance: none;
      background: transparent;
      height: 14px;
      cursor: ew-resize;
      padding: 0;
      margin: 0;
    }
    .dm-fslider::-webkit-slider-runnable-track {
      height: 3px;
      background: var(--dm-input-border);
      border-radius: 2px;
    }
    .dm-fslider::-moz-range-track {
      height: 3px;
      background: var(--dm-input-border);
      border-radius: 2px;
    }
    .dm-fslider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 13px; height: 13px; border-radius: 50%;
      background: var(--dm-accent);
      border: 2px solid var(--dm-bg);
      margin-top: -5px;
      cursor: ew-resize;
      box-shadow: 0 0 0 1px var(--dm-input-border-hover);
    }
    .dm-fslider::-moz-range-thumb {
      width: 13px; height: 13px; border-radius: 50%;
      background: var(--dm-accent);
      border: 2px solid var(--dm-bg);
      cursor: ew-resize;
      box-shadow: 0 0 0 1px var(--dm-input-border-hover);
    }
    .dm-fslider::-moz-range-progress { background: transparent; }
    .dm-select {
      background: var(--dm-input-bg);
      border: 1px solid var(--dm-input-border);
      border-radius: 5px;
      color: var(--dm-text);
      font-size: 11px;
      padding: 6px;
      outline: none;
      cursor: pointer;
      -webkit-appearance: none;
      transition: border-color 0.12s ease;
    }
    .dm-select:hover { border-color: var(--dm-input-border-hover); }
    .dm-select:focus { border-color: var(--dm-accent); }
    .dm-btn {
      background: var(--dm-btn-bg);
      border: 1px solid var(--dm-btn-border);
      border-radius: 5px;
      color: var(--dm-text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 5px 7px;
      transition: background-color 0.12s ease, border-color 0.12s ease;
    }
    .dm-btn:hover { background: var(--dm-bg-tertiary); border-color: var(--dm-input-border-hover); }
    .dm-btn:disabled, .dm-btn[data-disabled="true"] {
      background: var(--dm-btn-bg-disabled);
      border-color: var(--dm-btn-border-disabled);
      color: var(--dm-text-dim);
      cursor: default;
      opacity: 0.5;
      pointer-events: none;
    }

    /* ── Figma-style Design tab vocabulary ── */
    /* Icon button rows (alignment, flip, layout-mode segmented). Each item
       uses [data-active="true"] for the selected state — the same pattern
       Figma uses for its segmented controls. */
    .dm-icon-row {
      display: flex;
      gap: 2px;
    }
    .dm-icon-row-button {
      flex: 1;
      padding: 6px;
      background: var(--dm-input-bg);
      border: 1px solid var(--dm-input-border);
      border-radius: 5px;
      color: var(--dm-text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.12s ease, border-color 0.12s ease, color 0.12s ease;
    }
    .dm-icon-row-button:hover {
      background: var(--dm-bg-tertiary);
      border-color: var(--dm-input-border-hover);
    }
    .dm-icon-row-button[data-active="true"] {
      background: var(--dm-accent-bg);
      border-color: var(--dm-accent-border);
      color: var(--dm-accent);
    }

    /* Segmented control — same idea as icon-row but with shared background
       and tighter visuals. Used for stroke position (Inside/Outside/Center)
       and layout-mode (Free/HStack/VStack/Grid). */
    .dm-segmented {
      display: flex;
      background: var(--dm-input-bg);
      border: 1px solid var(--dm-input-border);
      border-radius: 5px;
      padding: 2px;
      gap: 2px;
    }
    .dm-segmented-item {
      flex: 1;
      padding: 5px 6px;
      border-radius: 3px;
      cursor: pointer;
      color: var(--dm-text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      font-size: 11px;
      transition: background-color 0.12s ease, color 0.12s ease;
      border: none;
      background: none;
      font-family: inherit;
    }
    .dm-segmented-item:hover {
      color: var(--dm-text-secondary);
    }
    .dm-segmented-item[data-active="true"] {
      background: var(--dm-bg-active);
      color: var(--dm-text);
    }

    /* Section header action cluster (eye / + / advanced / reset). Sits to
       the right of the title and inherits the section header's pointer
       events but stops propagation so clicking an action doesn't toggle
       the section open/closed. */
    .dm-section-actions {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }
    .dm-section-action {
      background: none;
      border: none;
      color: var(--dm-text-dim);
      cursor: pointer;
      padding: 2px;
      display: flex;
      border-radius: 3px;
      transition: color 0.12s ease, background-color 0.12s ease;
    }
    .dm-section-action:hover {
      color: var(--dm-text);
      background: var(--dm-bg-secondary);
    }
    .dm-section-action[data-active="true"] {
      color: var(--dm-accent);
    }

    /* Popovers (sides-toggle, effects-add, blend-mode picker, stroke-style).
       Anchored under the trigger button by the parent's positioning. */
    .dm-popover {
      position: absolute;
      top: calc(100% + 4px);
      right: 0;
      min-width: 180px;
      background: var(--dm-bg);
      border: 1px solid var(--dm-separator-strong);
      border-radius: 6px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.18);
      z-index: 30;
      padding: 6px;
    }
    .dm-popover-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      color: var(--dm-text);
      background: none;
      border: none;
      width: 100%;
      text-align: left;
      font-family: inherit;
    }
    .dm-popover-item:hover {
      background: var(--dm-bg-secondary);
    }
    .dm-popover-item[data-active="true"] {
      color: var(--dm-accent);
    }
    .dm-popover-divider {
      height: 1px;
      background: var(--dm-separator);
      margin: 4px 0;
    }

    /* Corner radius grid — linked input on top, 2x2 individual corners
       below. Each corner input is small and labelled with a corner glyph. */
    .dm-corner-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    /* Advanced toggle — small icon button in section headers that switches
       the active state of an advanced/disclosure region below. */
    .dm-advanced-toggle[data-open="true"] {
      color: var(--dm-accent);
      background: var(--dm-accent-bg);
    }

    /* ── Transitions (Phase 4B) ── */
    .dm-layer-item {
      transition: background-color 0.12s ease, opacity 0.2s ease;
    }
    .dm-layer-item:hover {
      background-color: var(--dm-bg-secondary) !important;
    }
    .dm-section-body {
      transition: max-height 0.2s ease, opacity 0.15s ease, padding-bottom 0.15s ease;
      overflow: hidden;
    }
    .dm-section-body.dm-collapsed {
      max-height: 0 !important;
      opacity: 0;
      padding-top: 0 !important;
      padding-bottom: 0 !important;
    }
    .dm-section-body.dm-expanded {
      opacity: 1;
    }

    /* ── Layer hover actions ── */
    .dm-layer-item .dm-layer-drag,
    .dm-layer-item .dm-layer-hover-actions {
      opacity: 0;
      transition: opacity 0.15s;
    }
    .dm-layer-item:hover .dm-layer-drag,
    .dm-layer-item:hover .dm-layer-hover-actions {
      opacity: 1;
    }
    /* Drop indicator for layer drag-drop — Keynote-style "insertion bar".
       A single floating line element (#dm-drop-indicator) is positioned
       on every dragover frame to snap precisely between rows. The line's
       horizontal `left` matches the destination depth (each indent step
       is 16px), so the user can read the depth from the line itself.
       For a "drop INTO target as a child" gesture the line indents one
       extra level AND the target row gets an accent-tinted highlight to
       say "this row becomes the parent." */
    #dm-drop-indicator {
      position: fixed;
      height: 3px;
      background: var(--dm-accent);
      border-radius: 999px;
      box-shadow: 0 0 0 1px var(--dm-bg), 0 0 6px rgba(79, 158, 255, 0.5);
      pointer-events: none;
      z-index: 9999;
      display: none;
      transition: top 80ms ease, left 80ms ease, width 80ms ease;
    }
    #dm-drop-indicator::before,
    #dm-drop-indicator::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--dm-accent);
      transform: translateY(-50%);
    }
    #dm-drop-indicator::before { left: -2px; }
    #dm-drop-indicator::after  { right: -2px; }
    .dm-layer-item.dm-drop-parent {
      background: var(--dm-accent-bg) !important;
      box-shadow: inset 0 0 0 1px var(--dm-accent-border);
    }

    /* ── Changes revert button ── */
    .dm-change-item .dm-change-revert {
      opacity: 0;
      transition: opacity 0.15s;
    }
    .dm-change-item:hover .dm-change-revert {
      opacity: 1;
    }

    /* ── Indentation guides ── */
    .dm-indent-guide {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 1px;
      background: var(--dm-separator);
    }

    /* ── Layer search ── */
    .dm-layer-search {
      background: var(--dm-input-bg);
      border: 1px solid var(--dm-input-border);
      border-radius: 6px;
      color: var(--dm-text);
      font-size: 11px;
      padding: 6px 8px 6px 28px;
      outline: none;
      width: 100%;
      transition: border-color 0.12s ease;
    }
    .dm-layer-search:hover { border-color: var(--dm-input-border-hover); }
    .dm-layer-search:focus { border-color: var(--dm-accent); }
    .dm-layer-search::placeholder { color: var(--dm-text-dim); }

    /* ── Changes group card ── */
    .dm-change-group {
      border-bottom: 1px solid var(--dm-separator);
    }
    .dm-change-group-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      cursor: pointer;
      user-select: none;
      transition: background-color 0.12s ease;
    }
    .dm-change-group-header:hover {
      background: var(--dm-bg-secondary);
    }

    /* ── Animations ── */
    @keyframes dm-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* ── High-frequency Design-tab atoms.
       Every input row, dropdown, sub-section header, grid, and spacer in the
       Design tab used to ship its own ~10-property inline `style="…"` blob.
       These classes back the `inp` / `inpKw` / `sel` / `sub` / `grid` / `sp`
       helpers — same visuals, ~1.5k fewer lines of generated markup. */
    .dm-field { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
    .dm-field-label {
      font-size: 10px;
      color: var(--dm-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .dm-field-label-icon {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .dm-field-label-hidden { visibility: hidden; }
    .dm-input-shell {
      display: flex;
      align-items: center;
      border-radius: 5px;
      overflow: hidden;
      background: var(--dm-input-bg);
      border: 1px solid var(--dm-input-border);
    }
    /* Bare input inside an input shell — strips its own border/background
       so the shell renders the chrome and the input owns the text only. */
    .dm-input-bare {
      background: none;
      border: none;
      padding: 6px;
      width: 100%;
      min-width: 0;
    }
    .dm-input-unit {
      font-size: 9px;
      color: var(--dm-text-dim);
      padding-right: 6px;
      flex-shrink: 0;
      opacity: 0.6;
      pointer-events: none;
    }
    .dm-input-unit-faint { opacity: 0.4; }

    /* ── Solid-fill row ──────────────────────────────────────────────
       Figma-style inline editor: grip, swatch, colour-code field,
       opacity %, then hover-revealed eye + delete. The whole row is
       one input shell so it reads like a unit; the swatch click opens
       the colour panel below the row (rendered separately). */
    .dm-fill-row-solid {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
      background: var(--dm-bg-secondary);
      border: 1px solid var(--dm-separator);
      border-radius: 5px;
    }
    .dm-fill-swatch {
      width: 22px;
      height: 22px;
      border-radius: 4px;
      border: 1px solid var(--dm-input-border);
      cursor: pointer;
      padding: 0;
      flex-shrink: 0;
      background-image:
        linear-gradient(45deg, rgba(0,0,0,0.06) 25%, transparent 25%, transparent 75%, rgba(0,0,0,0.06) 75%),
        linear-gradient(45deg, rgba(0,0,0,0.06) 25%, transparent 25%, transparent 75%, rgba(0,0,0,0.06) 75%);
      background-size: 8px 8px;
      background-position: 0 0, 4px 4px;
    }
    .dm-fill-code {
      flex: 1;
      min-width: 0;
      background: none;
      border: none;
      padding: 4px 6px;
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 11px;
      color: var(--dm-text);
      outline: none;
      text-transform: uppercase;
    }
    .dm-fill-code:focus { background: var(--dm-input-bg); border-radius: 3px; }
    .dm-fill-opacity {
      display: flex;
      align-items: center;
      width: 56px;
      flex-shrink: 0;
      background: var(--dm-input-bg);
      border: 1px solid var(--dm-input-border);
      border-radius: 4px;
      padding-right: 4px;
    }
    .dm-fill-opacity .dm-input-bare { font-size: 11px; padding: 4px 4px; text-align: right; }
    .dm-fill-action {
      background: none;
      border: none;
      color: var(--dm-text-dim);
      cursor: pointer;
      padding: 3px;
      border-radius: 3px;
      display: flex;
      flex-shrink: 0;
    }
    .dm-fill-action:hover { color: var(--dm-text); background: rgba(0, 0, 0, 0.06); }
    [data-theme="dark"] .dm-fill-action:hover { background: rgba(255, 255, 255, 0.06); }
    /* Hover-only actions live at the right edge of the row, visible only
       when the row itself is hovered or one of them has focus. */
    .dm-fill-action-hover { opacity: 0; transition: opacity 0.12s ease; }
    .dm-fill-row-solid:hover .dm-fill-action-hover,
    .dm-fill-action-hover:focus,
    .dm-fill-action-hover:focus-visible { opacity: 1; }

    /* Read-only value cell used in place of <input> when a size field is
       in Hug / Fill mode. Same metrics as .dm-input-bare so the shell
       doesn't reflow when the mode toggles. */
    .dm-input-readonly {
      background: none;
      border: none;
      padding: 6px;
      width: 100%;
      min-width: 0;
      color: var(--dm-text-muted);
      font: inherit;
      cursor: default;
      user-select: text;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    /* Size-mode picker (Fixed / Hug / Fill) for W / H inputs. Sits inside
       the input shell — borderless, faint, with a chevron on hover. */
    .dm-size-mode {
      appearance: none;
      -webkit-appearance: none;
      background: none;
      border: none;
      border-left: 1px solid var(--dm-input-border);
      color: var(--dm-text-muted);
      font-size: 9px;
      font-family: inherit;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      padding: 0 6px;
      height: 100%;
      min-height: 28px;
      cursor: pointer;
      outline: none;
      flex-shrink: 0;
      transition: color 0.12s ease, background 0.12s ease;
    }
    .dm-size-mode:hover { color: var(--dm-text); background: rgba(0, 0, 0, 0.03); }
    [data-theme="dark"] .dm-size-mode:hover { background: rgba(255, 255, 255, 0.04); }
    .dm-size-mode:focus { color: var(--dm-text); }
    .dm-section-sub {
      color: var(--dm-text-dim);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
      margin-top: 6px;
    }
    .dm-spacer { height: 10px; }
    .dm-grid { display: grid; gap: 8px; }
    .dm-grid-2 { grid-template-columns: repeat(2, 1fr); }
    .dm-grid-3 { grid-template-columns: repeat(3, 1fr); }
    .dm-grid-4 { grid-template-columns: repeat(4, 1fr); }
    .dm-grid-12 {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 6px;
      align-items: end;
    }
    .dm-grid-12 > .dm-cell { min-width: 0; }
    .dm-grid-12 > .dm-cell-1 { grid-column: span 1; }
    .dm-grid-12 > .dm-cell-2 { grid-column: span 2; }
    .dm-grid-12 > .dm-cell-3 { grid-column: span 3; }
    .dm-grid-12 > .dm-cell-4 { grid-column: span 4; }
    .dm-grid-12 > .dm-cell-5 { grid-column: span 5; }
    .dm-grid-12 > .dm-cell-6 { grid-column: span 6; }
    .dm-grid-12 > .dm-cell-7 { grid-column: span 7; }
    .dm-grid-12 > .dm-cell-8 { grid-column: span 8; }
    .dm-grid-12 > .dm-cell-9 { grid-column: span 9; }
    .dm-grid-12 > .dm-cell-10 { grid-column: span 10; }
    .dm-grid-12 > .dm-cell-11 { grid-column: span 11; }
    .dm-grid-12 > .dm-cell-12 { grid-column: span 12; }

    /* ── Hover indicator ── */
    .dm-hover-indicator {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 9px;
      font-weight: 500;
    }
    .dm-hover-indicator.hovering {
      background: rgba(251,191,36,0.12);
      color: #FBBF24;
    }
    .dm-hover-indicator.selected {
      background: rgba(79,158,255,0.12);
      color: #4F9EFF;
    }
  </style>
</head>
<body>
  <div id="dm-root"></div>
  <script src="/sidepanel.js"></script>
</body>
</html>
